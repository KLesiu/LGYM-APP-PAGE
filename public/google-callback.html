<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google OAuth Callback</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          Ubuntu, Cantarell, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      .container {
        text-align: center;
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      h1 {
        margin: 0 0 0.5rem;
        color: #333;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #666;
        font-size: 0.95rem;
      }
      .error {
        color: #e74c3c;
        background: #fadbd8;
        padding: 1rem;
        border-radius: 4px;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <h1>Processing OAuth Callback</h1>
      <p>Please wait while we complete your authentication...</p>
      <div id="error-container"></div>
    </div>

    <script>
      (function () {
        const fragment = window.location.hash.substring(1);
        const params = new URLSearchParams(fragment);

        const idToken = params.get("id_token");
        const accessToken = params.get("access_token");
        const error = params.get("error");
        const errorDescription = params.get("error_description");
        const state = params.get("state");

        let message;

        if (error) {
          message = {
            success: false,
            error,
            errorDescription: errorDescription || undefined,
            state: state || undefined,
          };
        } else if (idToken) {
          message = {
            success: true,
            idToken,
            accessToken: accessToken || undefined,
            state: state || undefined,
          };
        } else {
          message = {
            success: false,
            error: "invalid_request",
            errorDescription: "Missing id_token or error in callback",
            state: state || undefined,
          };
        }

        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage(message, window.location.origin);

            setTimeout(() => {
              window.close();
            }, 100);
          } catch (err) {
            console.error("Failed to send message to opener:", err);
            displayError("Failed to communicate with parent window");
          }
        } else {
          displayError("This page must be opened from another window");
        }

        function displayError(errorMsg) {
          const errorContainer = document.getElementById("error-container");
          const spinner = document.querySelector(".spinner");
          const h1 = document.querySelector("h1");
          const p = document.querySelector("p");

          if (spinner) spinner.style.display = "none";
          if (h1) h1.textContent = "Authentication Error";
          if (p) p.style.display = "none";

          if (errorContainer) {
            errorContainer.innerHTML = `<div class="error">${errorMsg}</div>`;
          }
        }
      })();
    </script>
  </body>
</html>
