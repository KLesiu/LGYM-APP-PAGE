name: Docker Image

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read

concurrency:
  group: page-production-release
  cancel-in-progress: false

env:
  DOCKERFILE: Dockerfile

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: read
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_version: ${{ steps.release.outputs.release_version }}
      release_sha: ${{ steps.release.outputs.release_sha }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || 'main' }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure release bot git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create production version tag
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
        run: |
          set -euo pipefail

          package_version_changed=false

          existing_release_commit="$(git log origin/main --grep="source-sha: ${SOURCE_MERGE_SHA}" --format='%H' -n 1 || true)"

          if [[ -n "${existing_release_commit}" ]]; then
            release_version="$(git show "${existing_release_commit}:package.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(data).version));")"
            release_tag="v${release_version}"

            {
              echo "release_tag=${release_tag}"
              echo "release_version=${release_version}"
              echo "release_sha=${existing_release_commit}"
            } >>"${GITHUB_OUTPUT}"

            exit 0
          fi

          base_version="$(git show "HEAD^:package.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(data).version));")"
          head_version="$(node -p "require('./package.json').version")"

          if [[ "${base_version}" != "${head_version}" ]]; then
            package_version_changed=true
          fi

          if [[ "${package_version_changed}" != 'true' ]]; then
            node <<'NODE'
          const fs = require('node:fs');

          const packageJsonPath = 'package.json';
          const packageLockPath = 'package-lock.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          const packageLock = JSON.parse(fs.readFileSync(packageLockPath, 'utf8'));
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(packageJson.version);

          if (!match) {
            throw new Error(`package.json version must be semver X.Y.Z, got ${packageJson.version}`);
          }

          const nextVersion = `${match[1]}.${match[2]}.${Number(match[3]) + 1}`;
          packageJson.version = nextVersion;
          packageLock.version = nextVersion;

          if (packageLock.packages?.['']) {
            packageLock.packages[''].version = nextVersion;
          }

          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          fs.writeFileSync(packageLockPath, `${JSON.stringify(packageLock, null, 2)}\n`);
          NODE

            release_version="$(node -p "require('./package.json').version")"
            git add package.json package-lock.json
            git commit -m "chore: release page v${release_version} [skip ci] source-sha: ${SOURCE_MERGE_SHA}"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          else
            release_version="$(node -p "require('./package.json').version")"
            lock_version="$(node -p "require('./package-lock.json').version")"

            if ! [[ "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "package.json version must be semver X.Y.Z, got ${release_version}." >&2
              exit 1
            fi

            if [[ "${release_version}" != "${lock_version}" ]]; then
              echo "package.json version (${release_version}) must match package-lock.json version (${lock_version})." >&2
              exit 1
            fi
          fi

          release_tag="v${release_version}"

          if git rev-parse --verify --quiet "refs/tags/${release_tag}" >/dev/null; then
            existing_tag_sha="$(git rev-parse "refs/tags/${release_tag}^{commit}")"
            current_sha="$(git rev-parse HEAD)"

            if [[ "${existing_tag_sha}" != "${current_sha}" ]]; then
              echo "Release tag ${release_tag} already exists on ${existing_tag_sha}; refusing to reuse it for ${current_sha}." >&2
              exit 1
            fi
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_version=${release_version}"
            echo "release_sha=$(git rev-parse HEAD)"
          } >>"${GITHUB_OUTPUT}"

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.release_tag != ''
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || vars.DOCKERHUB_NAMESPACE }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || 'lgym-page' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release_sha }}
          persist-credentials: false

      - name: Validate workflow variables
        run: |
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_NAMESPACE"
          test -n "$DOCKERHUB_IMAGE_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release.outputs.release_tag }}
            type=sha,format=short,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish workflow summary
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo '## Docker image publish' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'Published Docker Hub image references:' >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE_TAGS" | tr ',' '\n' | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"

  tag:
    runs-on: ubuntu-latest
    needs:
      - release
      - publish
    if: needs.release.outputs.release_tag != '' && needs.publish.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release_sha }}
          persist-credentials: false

      - name: Push production Git tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release.outputs.release_tag }}
          RELEASE_SHA: ${{ needs.release.outputs.release_sha }}
        run: |
          set -euo pipefail

          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            existing_tag_sha="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"

            if [[ "${existing_tag_sha}" != "${RELEASE_SHA}" ]]; then
              echo "Release tag ${RELEASE_TAG} already exists on ${existing_tag_sha}; refusing to reuse it for ${RELEASE_SHA}." >&2
              exit 1
            fi

            exit 0
          fi

          git tag "${RELEASE_TAG}" "${RELEASE_SHA}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${RELEASE_TAG}"
