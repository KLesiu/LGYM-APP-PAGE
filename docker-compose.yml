name: lgym-page

services:
  page-frontend:
    image: lgym-page:local
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://localhost:7025}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "${PAGE_PORT:-8080}:8080"
    restart: unless-stopped
